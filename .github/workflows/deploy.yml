name: Deploy to GitHub Pages

on:
  push:
    branches: ["claude/determined-wozniak-4ypen2", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # include static assets (hero video, poster, etc.)
          if [ -d assets ]; then cp -r assets _site/assets; fi
          if [ -f CNAME ]; then cp CNAME _site/CNAME; fi
          if [ -f sitemap.xml ]; then cp sitemap.xml _site/sitemap.xml; fi
          if [ -f robots.txt ]; then cp robots.txt _site/robots.txt; fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
